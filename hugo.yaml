baseURL: 'https://fika-guild.xyz/'
languageCode: 'sv'
title: 'Fika'
theme: 'hextra'

# Essential for Hextra's lightning-fast client-side search engine
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Multilingual Configuration Core
defaultContentLanguage: 'sv'
defaultContentLanguageInSubdir: false

languages:
  sv:
    languageName: 'Svenska'
    weight: 1
    contentDir: 'content'
    title: 'Fika'
    menu:
      main:
        - name: 'Nyheter'
          pageRef: '/nyheter'
          weight: 5
        - name: 'Artiklar'
          pageRef: '/artiklar'
          weight: 10
        - name: 'Search'
          weight: 90
          params:
            type: 'search'
        - name: 'Discord'
          url: 'https://discord.gg/eqPBBVZSua'
          weight: 100
          params:
            icon: 'discord'
        - languageSwitcher: true 
          params:
            type: language-switch
            label: false # optional, default is false
            icon: "globe-alt" # optional, default is "translate"
    params:
      title: "Fika"
      description: "Fika, en svensk World of Warcraft guild på Chromiecraft."

  en:
    languageName: 'English'
    weight: 2
    contentDir: 'content'
    title: 'Fika'
    menu:
      main:
        - name: 'News'
          pageRef: '/nyheter' # Hugo maps this automatically if the English content file exists
          weight: 5
        - name: 'Articles'
          pageRef: '/artiklar'
          weight: 10
        - name: 'Search'
          weight: 90
          params:
            type: 'search'
        - name: 'Discord'
          url: 'https://discord.gg/eqPBBVZSua'
          weight: 100
          params:
            icon: 'discord'
        - languageSwitcher: true 
          params:
            type: language-switch
            label: false # optional, default is false
            icon: "globe-alt" # optional, default is "translate"
    params:
      title: "Fika"
      description: "Fika, a Swedish World of Warcraft guild on Chromiecraft."

# Global Shared Parameters
params:
  images:
  - https://res.cloudinary.com/dhmmkvcpy/image/upload/banner_lbze4h.png
  theme:
    default: "dark"
    displayToggle: false
  # Keeps the homepage clean and centered
  homepageSidebar: false

  archives:
    section: nyheter
    dateFormat: "Jan 02"

  footer:
    enable: true
    width: "normal" # matching your template layout rules
    displayPoweredBy: false
    displayCopyright: false

  navbar:
    logo:
      path: '/favicon.png' # Points directly to static/logo.png
      disabled: false

cascade:
  - target:
      path: /nyheter/**
    type: blog

markup:
  goldmark:
    renderer:
      unsafe: true

mediaTypes:
  application/javascript:
    suffixes:
      - js
  application/x-javascript:
    suffixes:
      - js
  application/octet-stream:
    suffixes:
      - js

caches:
  getresource:
    dir: ':cacheDir/:project'
    maxAge: 0

security:
  enableInlineShortcodes: true

  exec:
    allow:
      - '^(dart-)?sass(-embedded)?$'
      - '^go$'
      - '^git$'
      - '^npx$'
      - '^postcss$'
      - '^tailwindcss$'
    osEnv:
      - '(?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE|PROGRAMDATA)$'

  funcs:
    getenv:
      - '^HUGO_'
      - '^CI$'

  http:
    methods:
      - GET
    urls:
      - 'https://wowgaming.altervista.org/*'
      - 'https://cdn.jsdelivr.net/*'
      - 'https://azzco.xyz/*'
      - 'https://fika-api-proxy.robin-askelin.workers.dev/*'
    mediaTypes:
      - '^text/html$'
      - '^text/xml$'
      - '^application/xml$'
      - '^application/json$'
      - '^image/'
      - '^text/plain$'
      - '^application/javascript.*$'
      - '^application/x-javascript.*$'
      - '^text/javascript.*$'
      - '^application/octet-stream.*$'