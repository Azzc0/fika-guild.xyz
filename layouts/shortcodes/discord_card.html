{{- $lang := .Page.Lang -}}

<div class="hextras-card-custom nx-not-prose" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%; min-height: 400px; border-radius: 0.5rem; overflow: hidden; border: 1px solid rgba(156, 163, 175, 0.15); background: #1a1b1e; padding: 1.25rem; box-sizing: border-box; font-family: sans-serif;">
  
  <div style="display: flex; flex-direction: column; height: calc(100% - 45px);">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
      <div style="display: flex; align-items: center; gap: 0.5rem;">
        <svg width="22" height="22" viewBox="0 0 127.14 96.36" fill="#5865F2">
          <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.4-5c.87-.64,1.72-1.32,2.53-2a75.47,75.47,0,0,0,72.71,0c.81.7,1.66,1.38,2.53,2a68.43,68.43,0,0,1-10.4,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129.89,49.38,123.82,26.54,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.78,46,53.78,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96,46,96,53,91,65.69,84.69,65.69Z"/>
        </svg>
        <h3 style="margin: 0; font-size: 1.1rem; font-weight: 600; color: #fff; letter-spacing: 0.5px;">DISCORD</h3>
      </div>
      <span id="discord-qty" style="font-size: 0.75rem; font-weight: 600; color: #9ca3af; background: rgba(156, 163, 175, 0.1); padding: 2px 6px; border-radius: 10px;">
        0 {{ if eq $lang "en" }}ONLINE{{ else }}ONLINE{{ end }}
      </span>
    </div>

    <div style="font-size: 0.75rem; font-weight: 700; color: #4e5058; text-transform: uppercase; letter-spacing: 0.5px; margin: 0.75rem 0 0.5rem 0;">
      {{ if eq $lang "en" }}Members Online{{ else }}Medlemmar Online{{ end }}
    </div>
    
    <div id="discord-members" style="display: flex; flex-direction: column; gap: 8px; flex-grow: 1; overflow-y: auto; margin-bottom: 1rem; padding-right: 4px;">
    </div>
  </div>

  <a id="discord-link" href="#" target="_blank" rel="noopener noreferrer" style="display: block; width: 100%; text-align: center; background: #5865F2; color: #fff; text-decoration: none; padding: 0.55rem; border-radius: 0.375rem; font-size: 0.85rem; font-weight: 500; transition: background 0.2s;">
    {{ if eq $lang "en" }}Join the server{{ else }}Anslut till servern{{ end }}
  </a>

  <script>
    (function() {
      const guildID = "1509567817870082048";
      const currentLang = {{ $lang | jsonify | safeJS }};
      const excludedAccounts = ["ClassicBot", "RaidSignaturesBot", "WarcraftLogs", "Raid-Helper", "ChromieCraft Chat"];

      fetch(`https://discord.com/api/guilds/${guildID}/widget.json`)
        .then(response => response.json())
        .then(data => {
          if (!data || !data.members) return;

          const realMembers = data.members.filter(m => !excludedAccounts.includes(m.username));
          const totalOnline = realMembers.length;
          
          document.getElementById("discord-qty").textContent = totalOnline + " ONLINE";
          document.getElementById("discord-link").href = data.instant_invite || "#";

          const membersBox = document.getElementById("discord-members");
          membersBox.innerHTML = "";

          realMembers.forEach(member => {
            const row = document.createElement("div");
            row.style.display = "flex";
            row.style.alignItems = "center";
            row.style.gap = "0.65rem";
            row.style.padding = "2px 4px";
            row.style.width = "100%";
            row.style.boxSizing = "border-box";

            const avatarWrapper = document.createElement("div");
            avatarWrapper.style.position = "relative";
            avatarWrapper.style.display = "flex";
            avatarWrapper.style.flexShrink = "0";

            const img = document.createElement("img");
            img.src = member.avatar_url;
            img.alt = member.username;
            img.style.width = "24px";
            img.style.height = "24px";
            img.style.borderRadius = "50%";
            img.style.backgroundColor = "#2f3136";

            const statusDot = document.createElement("div");
            statusDot.style.position = "absolute";
            statusDot.style.bottom = "-1px";
            statusDot.style.right = "-1px";
            statusDot.style.width = "8px";
            statusDot.style.height = "8px";
            statusDot.style.borderRadius = "50%";
            statusDot.style.border = "2px solid #1a1b1e";
            statusDot.style.background = member.status === "online" ? "#23a55a" : "#f0b232";

            avatarWrapper.appendChild(img);
            avatarWrapper.appendChild(statusDot);

            const details = document.createElement("div");
            details.style.display = "flex";
            details.style.flexDirection = "column";
            details.style.overflow = "hidden";
            details.style.flexGrow = "1";
            details.style.minWidth = "0";

            const nameSpan = document.createElement("span");
            nameSpan.textContent = member.username;
            nameSpan.style.color = "#dbdee1";
            nameSpan.style.fontSize = "0.85rem";
            nameSpan.style.fontWeight = "500";
            nameSpan.style.display = "block";
            nameSpan.style.width = "100%";
            nameSpan.style.whiteSpace = "nowrap";
            nameSpan.style.textOverflow = "ellipsis";
            nameSpan.style.overflow = "hidden";

            details.appendChild(nameSpan);

            if (member.game) {
              const gameSpan = document.createElement("span");
              const playPrefix = currentLang === "en" ? "Playing " : "Spelar ";
              gameSpan.textContent = playPrefix + member.game.name;
              gameSpan.style.color = "#949ba4";
              gameSpan.style.fontSize = "0.7rem";
              gameSpan.style.display = "block";
              gameSpan.style.width = "100%";
              gameSpan.style.whiteSpace = "nowrap";
              gameSpan.style.textOverflow = "ellipsis";
              gameSpan.style.overflow = "hidden";
              details.appendChild(gameSpan);
            }

            row.appendChild(avatarWrapper);
            row.appendChild(details);
            membersBox.appendChild(row);
          });
        })
        .catch(() => {
          const errorMsg = currentLang === "en" 
            ? "Could not fetch online list right now." 
            : "Kunde inte hämta onlinelista just nu.";
          document.getElementById("discord-members").innerHTML = "<div style='color:#9ca3af; font-size:0.8rem;'>" + errorMsg + "</div>";
        });
    })();
  </script>
</div>
