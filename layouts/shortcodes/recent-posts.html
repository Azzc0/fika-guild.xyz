<div class="recent-posts">
  <h3>Senaste inläggen</h3>
  <ul>
    {{ range first 5 (where .Site.RegularPages "Section" "artiklar") }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      </li>
    {{ end }}
  </ul>
</div>
