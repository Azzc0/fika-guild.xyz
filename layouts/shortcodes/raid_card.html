<div class="hextras-card-custom nx-not-prose" style="display: flex; flex-direction: column; justify-content: space-between; height: 100%; min-height: 400px; border-radius: 0.5rem; overflow: hidden; border: 1px solid rgba(156, 163, 175, 0.15); background: #1a1b1e; padding: 1.25rem; box-sizing: border-box; font-family: sans-serif; text-align: left;">
  
  <div style="display: flex; flex-direction: column; height: calc(100% - 45px);">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
      <div style="display: flex; align-items: center; gap: 0.5rem;">
        <img src="https://res.cloudinary.com/dhmmkvcpy/image/upload/e_trim/w_44,c_scale/v1783872905/Raid_tnnvwr.png" alt="" style="width: 22px; height: 22px; object-fit: contain; margin: 0; padding: 0;">
        <h3 style="margin: 0; font-size: 1.1rem; font-weight: 600; color: #fff; letter-spacing: 0.5px; line-height: 1;">RÄDSCHEMA</h3>
      </div>
      <span id="raid-qty" style="font-size: 0.75rem; font-weight: 600; color: #9ca3af; background: rgba(156, 163, 175, 0.1); padding: 2px 6px; border-radius: 10px;">0 EVENT</span>
    </div>

    <div style="font-size: 0.75rem; font-weight: 700; color: #4e5058; text-transform: uppercase; letter-spacing: 0.5px; margin: 0.75rem 0 0.5rem 0;">Kommande vecka</div>
    
    <div id="raid-list-container" style="display: flex; flex-direction: column; gap: 8px; flex-grow: 1; height: 240px; overflow-y: auto; margin-bottom: 1rem; padding-right: 4px;">
      <div style="color: #71717a; font-size: 0.85rem; padding: 4px;">Laddar rädschema...</div>
    </div>
  </div>

  <a href="/evenemang" style="display: block; width: 100%; text-align: center; background: #5865F2; color: #fff; text-decoration: none; padding: 0.55rem; border-radius: 0.375rem; font-size: 0.85rem; font-weight: 500; transition: background 0.2s;">
    Visa fullständigt schema
  </a>

  <script>
    (function() {
      const DISCORD_SERVER_ID = "1509567817870082048";
      const API_BASE = "https://fika-api-proxy.robin-askelin.workers.dev/raids";
      
      const listContainer = document.getElementById('raid-list-container');
      const qtyBadge = document.getElementById('raid-qty');

      function getDifficultyIcon(sizeTag, titleStr, forumTags) {
        const title = titleStr.toLowerCase();
        const tags = forumTags.map(t => t.toLowerCase().trim());
        const isHeroic = title.includes('heroic') || title.includes('hc') || title.includes('hm') || title.includes('hardmode') ||
                         tags.includes('heroic') || tags.includes('hc') || tags.includes('hm') || tags.includes('hardmode');
        
        const size = (sizeTag || '').toLowerCase().replace('m', '');
        if (size === '25') {
          return isHeroic 
            ? "https://res.cloudinary.com/dhmmkvcpy/image/upload/v1783872384/25heroic_d5soiz.png"
            : "https://res.cloudinary.com/dhmmkvcpy/image/upload/v1783872385/25_cyyzkf.png";
        }
        return isHeroic 
          ? "https://res.cloudinary.com/dhmmkvcpy/image/upload/v1783872384/10heroic_hbdwj7.png"
          : "https://res.cloudinary.com/dhmmkvcpy/image/upload/v1783872386/10_d7ojfl.png";
      }

      function getRelativeDayName(eventDate, nowDate) {
        const localNow = new Date(nowDate.getFullYear(), nowDate.getMonth(), nowDate.getDate());
        const localEvt = new Date(eventDate.getFullYear(), eventDate.getMonth(), eventDate.getDate());
        const diffDays = Math.round((localEvt - localNow) / (1000 * 60 * 60 * 24));

        if (diffDays === 0) return "Idag";
        if (diffDays === 1) return "Imorgon";
        
        const weekdayNames = ["Sön", "Mån", "Tis", "Ons", "Tor", "Fre", "Lör"];
        return weekdayNames[eventDate.getDay()];
      }

      async function fetchRaidSchedule() {
        try {
          const response = await fetch(API_BASE + "?endpoint=scheduledevents");
          if (!response.ok) throw new Error("Network response error");
          const data = await response.json();
          
          const now = new Date();
          
          // Total pool of active future events
          const futureEvents = (data.postedEvents || []).map(e => {
            e.eventDate = new Date(e.startTime * 1000);
            return e;
          }).filter(e => e.eventDate >= now);

          // Universal count badge text update
          const eventWord = futureEvents.length === 1 ? " EVENT" : " EVENT";
          qtyBadge.textContent = futureEvents.length + eventWord;

          // Filter view list strictly to the rolling 7 days
          const oneWeekFromNow = new Date();
          oneWeekFromNow.setDate(now.getDate() + 7);
          
          const weekEvents = futureEvents
            .filter(e => e.eventDate <= oneWeekFromNow)
            .sort((a, b) => a.eventDate - b.eventDate);

          if (weekEvents.length === 0) {
            listContainer.innerHTML = '<div style="color: #71717a; font-size: 0.85rem; padding: 4px;">Inga planerade event närmsta 7 dagarna.</div>';
            return;
          }

          let htmlOutput = "";
          
          for (let i = 0; i < weekEvents.length; i++) {
            const event = weekEvents[i];
            
            let sizeTag = null;
            let forumTags = [];
            if (event.advancedSettings && event.advancedSettings.forum_tags) {
              const rawTags = event.advancedSettings.forum_tags.split(',').map(t => t.trim());
              for (let j = 0; j < rawTags.length; j++) {
                const tag = rawTags[j];
                if (!tag) continue;
                if (/^\d+m$/i.test(tag) && !sizeTag) {
                  sizeTag = tag;
                } else {
                  forumTags.push(tag);
                }
              }
            }

            const finalImageUrl = getDifficultyIcon(sizeTag, event.title, forumTags);
            const dayLabel = getRelativeDayName(event.eventDate, now);
            const timeString = event.eventDate.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
            const signUps = typeof event.signUpCount !== 'undefined' ? event.signUpCount : (event.signUps ? event.signUps.length : 0);
            
            const discordLink = "https://discord.com/channels/" + DISCORD_SERVER_ID + "/" + event.channelId + "/" + event.id;
            
            let metaSegments = [dayLabel + " kl " + timeString];
            if (sizeTag) {
              metaSegments.push("(" + signUps + "/" + sizeTag.slice(0, -1) + ")");
            }
            if (event.leaderName) {
              metaSegments.push("Ledare: " + event.leaderName);
            }
            
            const metaDisplay = metaSegments.join(" • ");

            htmlOutput += '<div style="display: flex; align-items: center; gap: 0.65rem; padding: 2px 4px; width: 100%; box-sizing: border-box;">';
            
            // Difficulty Icon
            htmlOutput += '  <div style="position: relative; display: flex; flex-shrink: 0; width: 24px; height: 24px; background: transparent; overflow: hidden; align-items: center; justify-content: center;">';
            htmlOutput += '    <img src="' + finalImageUrl + '" alt="" style="width: 100%; height: 100%; object-fit: contain;">';
            htmlOutput += '  </div>';
            
            // Content Block
            htmlOutput += '  <div style="display: flex; flex-direction: column; overflow: hidden; flex-grow: 1; min-width: 0;">';
            htmlOutput += '    <div style="display: flex; align-items: baseline; gap: 0.35rem; width: 100%; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;">';
            htmlOutput += '      <a href="' + discordLink + '" target="_blank" style="text-decoration: none; color: #dbdee1; font-size: 0.85rem; font-weight: 500; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">' + event.title + '</a>';
            htmlOutput += '    </div>';
            htmlOutput += '    <span style="color: #949ba4; font-size: 0.7rem; display: block; width: 100%; white-space: nowrap; text-overflow: ellipsis; overflow: hidden;">';
            htmlOutput += '      ' + metaDisplay;
            htmlOutput += '    </span>';
            htmlOutput += '  </div>';
            htmlOutput += '</div>';
          }

          listContainer.innerHTML = htmlOutput;
        } catch (error) {
          listContainer.innerHTML = '<div style="color: #ef4444; font-size: 0.85rem; padding: 4px;">Kunde inte hämta rädschemat.</div>';
        }
      }

      fetchRaidSchedule();
    })();
  </script>
</div>
