{{ define "main" }}

{{/* Check language once to keep the markup clean */}}
{{ $isEn := hasPrefix .Site.Language.Lang "en" }}

<div class="roster-page">

    <div class="prose dark:prose-invert max-w-none roster-intro">
        <h1>{{ .Title }}</h1>
        {{ .Content }}
    </div>

    <div id="roster-detail-backdrop" class="detail-backdrop"></div>

    <div class="roster-layout">

        <section class="roster-left">

            <div id="roster-staleness-warning"
                 class="roster-staleness-warning"
                 style="display:none;"></div>

            <div id="r-toolbar" class="r-toolbar"></div>

            <div class="r-table-wrap">
                <table id="r-table">
                    <thead id="r-thead"></thead>
                    <tbody id="r-tbody"></tbody>
                </table>
            </div>

        </section>

        <aside class="roster-right">

            <div id="roster-detail" class="detail-panel">
                <div class="detail-empty">
                    {{ if $isEn }}
                        Select a player to view details.
                    {{ else }}
                        Välj en spelare för att se detaljer.
                    {{ end }}
                </div>
            </div>

        </aside>

    </div>

</div>

{{ end }}
