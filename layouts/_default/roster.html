{{ define "main" }}
<div class="prose dark:prose-invert max-w-none mb-4">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
</div>

<div class="not-prose roster-layout">

  <div class="roster-left">
    <div id="roster-staleness-warning" style="display:none;" class="roster-staleness-warning"></div>
    <div id="r-toolbar" class="r-toolbar"></div>
    <div class="r-table-wrap">
      <table id="r-table">
        <thead id="r-thead"></thead>
        <tbody id="r-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="roster-right">
    <div id="roster-detail" class="detail-panel">
      <div class="detail-empty">Välj en spelare för att se detaljer.</div>
    </div>
  </div>

</div>
{{ end }}
